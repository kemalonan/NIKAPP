<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKA BIM — İş Takip Sistemi</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="v20260321_123818">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c12;
  --bg2:#0d1219;
  --bg3:#111827;
  --surface:#131c2b;
  --surface2:#1a2540;
  --border:#1e2d45;
  --border2:#243352;
  --text:#dde6f5;
  --text2:#7e93b3;
  --text3:#4a607f;
  --gold:#f5b80e;
  --gold2:#d9a20c;
  --gold-bg:rgba(245,184,14,0.1);
  --gold-border:rgba(245,184,14,0.3);
  --blue:#38bdf8;
  --blue-bg:rgba(56,189,248,0.1);
  --green:#4ade80;
  --green-bg:rgba(74,222,128,0.08);
  --red:#f87171;
  --red-bg:rgba(248,113,113,0.1);
  --amber:#fbbf24;
  --amber-bg:rgba(251,191,36,0.1);
  --purple:#c084fc;
  --purple-bg:rgba(192,132,252,0.1);
  --cyan:#22d3ee;
  --r:8px;
  --rl:12px;
  --rxl:16px;
  --glow:0 0 20px rgba(245,184,14,0.15);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Exo 2',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── GRID SHELL ─────────────────────────────────── */
.shell{display:grid;grid-template-columns:240px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:50}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;position:relative}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,var(--gold),transparent);opacity:.2}
.main{overflow-y:auto;background:var(--bg)}

/* ── TOPBAR ─────────────────────────────────────── */
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-logo img{height:32px;filter:drop-shadow(0 0 6px rgba(245,184,14,0.4))}
.tb-sep{width:1px;height:24px;background:var(--border2);margin:0 4px}
.tb-title{font-size:.78rem;font-weight:500;color:var(--text2);letter-spacing:.5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-user{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:border-color .2s}
.tb-user:hover{border-color:var(--gold-border)}
.tb-noti{position:relative}
.noti-dot{position:absolute;top:0;right:0;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

/* ── SIDEBAR ─────────────────────────────────────── */
.sb-sect{padding:14px 12px 4px;font-size:.6rem;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;color:var(--text2);font-size:.8rem;font-weight:500;border-left:2px solid transparent;transition:all .15s;position:relative}
.sb-item:hover{color:var(--text);background:rgba(245,184,14,0.04)}
.sb-item.active{color:var(--gold);background:var(--gold-bg);border-left-color:var(--gold)}
.sb-item .si{width:15px;text-align:center;font-size:13px;flex-shrink:0}
.sb-cnt{margin-left:auto;background:var(--bg3);color:var(--text3);padding:1px 6px;border-radius:10px;font-size:.65rem;font-family:'JetBrains Mono',monospace}
.sb-item.active .sb-cnt{background:var(--gold-bg);color:var(--gold)}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:.75rem;font-family:'Exo 2',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.logout-btn:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* ── AVATAR ──────────────────────────────────────── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.av-sm{width:26px;height:26px;font-size:.58rem}
.av-md{width:34px;height:34px;font-size:.7rem}
.av-lg{width:42px;height:42px;font-size:.82rem}
.av-patron{background:linear-gradient(135deg,#7c2d12,#9a3412);color:#fed7aa;box-shadow:0 0 8px rgba(154,52,18,.3)}
.av-koordinator{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#bfdbfe;box-shadow:0 0 8px rgba(29,78,216,.3)}
.av-engineer{background:linear-gradient(135deg,#14532d,#15803d);color:#bbf7d0;box-shadow:0 0 8px rgba(21,128,61,.3)}

/* ── PAGE CONTENT ────────────────────────────────── */
.pc{padding:20px;max-width:1100px}
.pg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.pg-title{font-size:1.1rem;font-weight:700;letter-spacing:.3px}
.pg-sub{font-size:.78rem;color:var(--text2);font-weight:400}
.pg-title .hl{color:var(--gold)}
.add-btn{padding:8px 14px;background:var(--gold);color:#080c12;border:none;border-radius:var(--r);font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s;margin-left:auto}
.add-btn:hover{background:var(--gold2);box-shadow:0 0 12px rgba(245,184,14,.3)}
.sec-btn{padding:7px 12px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:.75rem;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
.sec-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.sec-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}

/* ── STATS ROW ───────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--rl) var(--rl) 0 0}
.stat-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent)}
.stat-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),transparent)}
.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.stat-label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-val{font-size:1.8rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-sub{font-size:.68rem;color:var(--text3);margin-top:4px}

/* ── FILTER BAR ──────────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fsel{padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.75rem;font-family:'Exo 2',sans-serif;outline:none;cursor:pointer;transition:border-color .15s}
.fsel:focus{border-color:var(--gold-border)}
.fsearch{flex:1;min-width:160px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.75rem;font-family:'Exo 2',sans-serif;outline:none;transition:border-color .15s}
.fsearch:focus{border-color:var(--gold-border)}
.fsearch::placeholder{color:var(--text3)}

/* ── TASK CARD ───────────────────────────────────── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s;position:relative}
.task-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,.2)}
.task-card.done-card{opacity:.5}
.tc-left{display:flex;gap:8px;align-items:flex-start;flex:1;min-width:0}
.pbar{width:3px;flex-shrink:0;border-radius:2px;align-self:stretch;min-height:18px}
.pb-h{background:var(--red)}
.pb-m{background:var(--amber)}
.pb-l{background:var(--green)}
.tc-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tc-check.chk{background:var(--green);border-color:var(--green)}
.tc-check.chk::after{content:"✓";color:#080c12;font-size:9px;font-weight:800}
.tc-title{font-size:.85rem;font-weight:600;margin-bottom:4px;line-height:1.3}
.tc-title.done{text-decoration:line-through;color:var(--text3)}
.tc-desc{font-size:.75rem;color:var(--text2);margin-bottom:6px;white-space:pre-wrap;line-height:1.5}
.tc-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag{font-size:.65rem;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.t-dl{background:var(--amber-bg);color:var(--amber)}
.t-dl.late{background:var(--red-bg);color:var(--red)}
.t-rec{background:var(--purple-bg);color:var(--purple)}
.t-cat{background:var(--gold-bg);color:var(--gold)}
.t-proj{background:var(--blue-bg);color:var(--blue)}
.t-file{background:rgba(34,211,238,.08);color:var(--cyan);cursor:pointer}
.t-img{background:var(--blue-bg);color:var(--blue);cursor:pointer}
.atag-row{display:flex;flex-wrap:wrap;gap:3px}
.atag{display:flex;align-items:center;gap:3px;font-size:.65rem;padding:2px 6px;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.tc-row{display:flex;align-items:flex-start;gap:8px}
.tc-actions{display:flex;gap:4px;flex-shrink:0}
.ib{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);transition:all .12s}
.ib:hover{background:var(--surface2);color:var(--text)}
.ib.del:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.tc-foot{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.cmmt-tog{font-size:.7rem;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .15s}
.cmmt-tog:hover{color:var(--gold)}
.file-tog{font-size:.7rem;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .15s}
.file-tog:hover{color:var(--cyan)}

/* ── COMMENTS ─────────────────────────────────────── */
.cmt-area{margin-top:10px;padding:10px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.cmt-item{display:flex;gap:8px;margin-bottom:10px}
.cmt-body{flex:1;min-width:0}
.cmt-hdr{display:flex;gap:6px;align-items:baseline;margin-bottom:2px}
.cmt-name{font-size:.72rem;font-weight:600}
.cmt-date{font-size:.65rem;color:var(--text3)}
.cmt-text{font-size:.75rem;color:var(--text2);line-height:1.5;white-space:pre-wrap}
.cmt-form{display:flex;gap:6px;margin-top:8px;align-items:flex-start}
.cmt-form textarea{flex:1;padding:6px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.75rem;font-family:'Exo 2',sans-serif;resize:none;outline:none;min-height:32px;max-height:80px;transition:border .12s}
.cmt-form textarea:focus{border-color:var(--gold-border)}
.cmt-form button{padding:6px 10px;background:var(--gold);color:#080c12;border:none;border-radius:var(--r);font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;flex-shrink:0}
.cmt-form button:hover{background:var(--gold2)}

/* ── FILES AREA ───────────────────────────────────── */
.files-area{margin-top:8px;padding:10px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:var(--r);margin-bottom:5px;border:1px solid var(--border)}
.file-item:last-child{margin-bottom:0}
.file-icon{font-size:16px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:.65rem;color:var(--text3)}
.file-del{width:20px;height:20px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:11px;flex-shrink:0;transition:color .12s;display:flex;align-items:center;justify-content:center}
.file-del:hover{color:var(--red)}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:12px;text-align:center;cursor:pointer;transition:all .15s;margin-top:6px}
.upload-zone:hover{border-color:var(--gold-border);background:var(--gold-bg)}
.upload-zone label{cursor:pointer;font-size:.72rem;color:var(--text3)}
.upload-zone:hover label{color:var(--gold)}
.upload-zone input[type=file]{display:none}

/* ── MODAL ─────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rxl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(245,184,14,.05)}
.modal-inner{padding:1.5rem}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-hdr h3{font-size:.95rem;font-weight:700;letter-spacing:.2px}
.modal-hdr h3 .hl{color:var(--gold)}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.close-btn:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* ── FORM ──────────────────────────────────────────── */
.fgrid{display:grid;gap:12px}
.flabel{font-size:.68rem;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.finput,textarea,select{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:.82rem;font-family:'Exo 2',sans-serif;outline:none;transition:border .15s}
.finput:focus,textarea:focus,select:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(245,184,14,.06)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:60px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.msel-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;max-height:180px;overflow-y:auto}
.ms-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .12s}
.ms-opt:hover{background:var(--bg3)}
.ms-opt input[type=checkbox]{width:14px;height:14px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;margin:0}
.ms-opt label{font-size:.8rem;cursor:pointer;flex:1;display:flex;align-items:center;gap:6px}
.fbtn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-ok{padding:8px 20px;background:var(--gold);color:#080c12;border:none;border-radius:var(--r);font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
.btn-ok:hover{background:var(--gold2);box-shadow:0 0 12px rgba(245,184,14,.3)}
.btn-cl{padding:8px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:.82rem;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
.btn-cl:hover{background:var(--surface2)}
.rbadge{font-size:.62rem;padding:2px 7px;border-radius:20px;font-weight:600}
.rb-patron{background:#7c2d12;color:#fed7aa}
.rb-koordinator{background:#1e3a5f;color:#bfdbfe}
.rb-engineer{background:#14532d;color:#bbf7d0}

/* ── AUTH ──────────────────────────────────────────── */
.auth-shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(245,184,14,.08) 0,transparent 60%)}
.auth-logo-wrap{text-align:center;margin-bottom:2rem}
.auth-logo-wrap img{height:54px;filter:drop-shadow(0 0 14px rgba(245,184,14,.5))}
.auth-tagline{font-size:.75rem;color:var(--text3);margin-top:8px;letter-spacing:1px;text-transform:uppercase}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rxl);padding:2rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(245,184,14,.04)}
.auth-tabs{display:flex;gap:0;margin-bottom:1.5rem;background:var(--bg2);border-radius:var(--r);padding:3px}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:.78rem;font-weight:600;border-radius:6px;color:var(--text2);transition:all .15s}
.auth-tab.active{background:var(--gold);color:#080c12}
.auth-login-list{display:grid;gap:7px}
.user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;text-align:left;width:100%;transition:all .15s;font-family:'Exo 2',sans-serif}
.user-btn:hover{border-color:var(--gold-border);background:var(--gold-bg)}
.auth-reg-form{display:grid;gap:10px}
.auth-info{font-size:.72rem;color:var(--text3);padding:8px 10px;background:var(--bg3);border-radius:var(--r);border-left:2px solid var(--gold);line-height:1.6}

/* ── PROJECTS (KANBAN/FLOW) ───────────────────────── */
.mt-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:400px}
.mt-col{min-width:260px;max-width:280px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);display:flex;flex-direction:column}
.mt-col-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mt-col-title{font-size:.8rem;font-weight:700;flex:1}
.mt-col-cnt{font-size:.7rem;color:var(--text3);background:var(--bg3);padding:1px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.mt-col-body{flex:1;padding:10px;overflow-y:auto}
.mt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.mt-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mt-card.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-border)}
.mt-card-title{font-size:.82rem;font-weight:600;margin-bottom:5px}
.mt-card-desc{font-size:.72rem;color:var(--text2);margin-bottom:7px;line-height:1.4}
.mt-card-meta{display:flex;flex-wrap:wrap;gap:4px}
.add-col-btn{padding:8px 12px;background:transparent;border:1.5px dashed var(--border2);border-radius:var(--r);color:var(--text3);cursor:pointer;font-size:.75rem;font-family:'Exo 2',sans-serif;transition:all .15s;min-width:220px;text-align:center}
.add-col-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.mt-add-card{padding:7px 10px;background:transparent;border:1px dashed var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;font-size:.72rem;font-family:'Exo 2',sans-serif;width:100%;transition:all .15s;margin-top:4px;text-align:left}
.mt-add-card:hover{border-color:var(--gold-border);color:var(--gold)}
.conn-line{position:absolute;pointer-events:none}

/* ── CATEGORIES PAGE ─────────────────────────────── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.cat-card.active-cat{border-color:var(--gold-border);box-shadow:0 0 0 1px var(--gold-border),var(--glow)}
.cat-name{font-size:.88rem;font-weight:700;margin-bottom:4px}
.cat-cnt{font-size:.72rem;color:var(--text2)}
.cat-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.cat-fill{height:100%;border-radius:2px}

/* ── CAT FILES SECTION ───────────────────────────── */
.cat-files-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cat-file-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;transition:border-color .15s}
.cat-file-item:hover{border-color:var(--border2)}
.cf-info{flex:1;min-width:0}
.cf-name{font-size:.8rem;font-weight:500}
.cf-meta{font-size:.65rem;color:var(--text3)}
.cf-dl{padding:4px 10px;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:5px;color:var(--gold);font-size:.68rem;cursor:pointer;font-family:'Exo 2',sans-serif}

/* ── MEETINGS ─────────────────────────────────────── */
.meet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
.meet-card:hover{border-color:var(--border2)}
.meet-date{text-align:center;flex-shrink:0;width:48px}
.meet-day{font-size:1.3rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--gold);line-height:1}
.meet-mon{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.meet-body{flex:1;min-width:0}
.meet-title{font-size:.85rem;font-weight:600;margin-bottom:4px}
.meet-meta{font-size:.72rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px}

/* ── OZET PAGE ────────────────────────────────────── */
.ozet-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.ozet-grid{grid-template-columns:1fr}}
.ozet-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.ozet-widget h4{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pr-label{font-size:.75rem;color:var(--text2);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.pr-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pr-fill{height:100%;border-radius:3px;transition:width .5s}
.pr-pct{font-size:.68rem;color:var(--text3);width:30px;text-align:right;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.notif-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.notif-text{font-size:.75rem;color:var(--text2);flex:1}
.notif-time{font-size:.65rem;color:var(--text3);flex-shrink:0}

/* ── NOTIFICATION SETTINGS ───────────────────────── */
.notif-settings-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ns-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ns-row:last-child{margin-bottom:0}
.toggle{width:36px;height:20px;background:var(--border2);border-radius:10px;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:left .15s}
.toggle.on::after{left:19px}

/* ── STATUS BADGES ───────────────────────────────────── */
.st-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.st-bekliyor{background:rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.25)}
.st-devam{background:rgba(56,189,248,.12);color:#38bdf8;border-color:rgba(56,189,248,.25)}
.st-tamamlandi{background:rgba(74,222,128,.12);color:#4ade80;border-color:rgba(74,222,128,.25)}
.st-iptal{background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.25)}
.st-bekliyor:hover{background:rgba(251,191,36,.22)}
.st-devam:hover{background:rgba(56,189,248,.22)}
.st-tamamlandi:hover{background:rgba(74,222,128,.22)}
.st-iptal:hover{background:rgba(248,113,113,.22)}
/* ── STATUS DROPDOWN ─────────────────────────────────── */
.st-drop{position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.st-drop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:.78rem;transition:background .12s}
.st-drop-item:hover{background:var(--bg3)}
/* ── SUBTASK ─────────────────────────────────────────── */
.subtask-area{margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);border-left:3px solid var(--gold)}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.subtask-item:last-child{border-bottom:none}
.sub-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sub-check.done{background:var(--green);border-color:var(--green)}
.sub-check.done::after{content:'✓';color:#080c12;font-size:8px;font-weight:800}
.sub-title{font-size:.78rem;flex:1}
.sub-title.done{text-decoration:line-through;color:var(--text3)}
.sub-prog{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.sub-prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
/* ── PEOPLE PAGE ─────────────────────────────────────── */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;transition:all .15s;position:relative}
.person-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.pc-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;margin:0 auto 12px;font-family:'JetBrains Mono',monospace}
.pc-name{font-size:.9rem;font-weight:700;text-align:center;margin-bottom:2px}
.pc-email{font-size:.68rem;color:var(--text3);text-align:center;margin-bottom:8px}
.pc-role{text-align:center;margin-bottom:12px}
.pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.pc-stat{text-align:center;padding:6px 4px;background:var(--bg2);border-radius:var(--r)}
.pc-stat-val{font-size:.95rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.pc-stat-lbl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.pc-actions{display:flex;gap:6px}
.pc-actions button{flex:1;padding:6px;font-size:.72rem;border-radius:var(--r);cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;transition:all .15s}
/* ── IMG OVERLAY ──────────────────────────────────── */
.img-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;cursor:pointer;backdrop-filter:blur(4px)}
.img-ov img{max-width:100%;max-height:90vh;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.5)}

/* ── EMPTY ─────────────────────────────────────────── */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:.8rem}
.empty-icon{font-size:2.5rem;margin-bottom:8px;opacity:.3}

/* ── SCROLLABLE BOARDS ───────────────────────────── */
.board-wrap{overflow-x:auto;padding-bottom:8px}

/* ── RESPONSIVE ───────────────────────────────────── */
@media(max-width:768px){
  .shell{grid-template-columns:1fr;grid-template-rows:52px auto 1fr}
  .sidebar{display:none;position:fixed;top:52px;left:0;bottom:0;z-index:200}
  .sidebar.open{display:flex}
  .frow{grid-template-columns:1fr}
}

/* ── AI PANEL ─────────────────────────────────────── */
.ai-fab{position:fixed;bottom:24px;right:24px;z-index:900;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#f5b80e,#ea580c);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(245,184,14,.4),0 0 0 0 rgba(245,184,14,.3);animation:aipulse 2.5s infinite}
@keyframes aipulse{0%,100%{box-shadow:0 4px 20px rgba(245,184,14,.4),0 0 0 0 rgba(245,184,14,.3)}50%{box-shadow:0 4px 24px rgba(245,184,14,.5),0 0 0 10px rgba(245,184,14,0)}}
.ai-panel{position:fixed;bottom:88px;right:24px;z-index:901;width:380px;max-height:600px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rxl);display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(245,184,14,.06);overflow:hidden}
.ai-panel.hidden{display:none}
.ai-panel-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(245,184,14,.08),rgba(234,88,12,.04))}
.ai-panel-hdr .ai-logo{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f5b80e,#ea580c);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-panel-hdr h4{font-size:.85rem;font-weight:700;flex:1}
.ai-panel-hdr .ai-model{font-size:.65rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.ai-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.ai-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.ai-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.ai-body{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* chat */
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:0}
.msg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:.78rem;line-height:1.55;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--text);align-self:flex-end;border-bottom-right-radius:3px}
.msg.ai{background:var(--bg3);border:1px solid var(--border);color:var(--text2);align-self:flex-start;border-bottom-left-radius:3px}
.msg.ai.thinking{color:var(--text3);font-style:italic}
.msg.ai strong{color:var(--gold);font-weight:600}
.msg.ai ul{padding-left:14px;margin:4px 0}
.msg.ai li{margin-bottom:2px}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px}
.chat-input-row textarea{flex:1;padding:7px 9px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:.77rem;font-family:'Exo 2',sans-serif;resize:none;outline:none;min-height:34px;max-height:80px;transition:border .12s;line-height:1.4}
.chat-input-row textarea:focus{border-color:var(--gold-border)}
.chat-send{padding:7px 12px;background:var(--gold);color:#080c12;border:none;border-radius:var(--r);font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;flex-shrink:0;transition:background .15s}
.chat-send:hover{background:var(--gold2)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* voice */
.voice-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.voice-key-row{display:flex;gap:6px}
.voice-key-row input{flex:1;padding:7px 9px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:.75rem;font-family:'JetBrains Mono',monospace;outline:none}
.voice-key-row input:focus{border-color:var(--gold-border)}
.voice-key-row button{padding:7px 10px;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r);color:var(--gold);font-size:.72rem;cursor:pointer;font-family:'Exo 2',sans-serif;flex-shrink:0}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto;transition:all .2s;flex-shrink:0}
.mic-btn.idle{background:linear-gradient(135deg,var(--bg3),var(--surface2));box-shadow:0 4px 16px rgba(0,0,0,.3)}
.mic-btn.idle:hover{box-shadow:0 4px 20px rgba(245,184,14,.25),0 0 0 4px rgba(245,184,14,.08)}
.mic-btn.recording{background:linear-gradient(135deg,#dc2626,#b91c1c);box-shadow:0 0 0 0 rgba(239,68,68,.4);animation:recpulse 1s infinite}
.mic-btn.processing{background:linear-gradient(135deg,#1d4ed8,#1e40af);cursor:wait}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
.voice-status{text-align:center;font-size:.78rem;color:var(--text2);min-height:20px}
.voice-transcript{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;font-size:.78rem;color:var(--text2);line-height:1.5;min-height:50px;white-space:pre-wrap}
.voice-parsed{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r);padding:10px;font-size:.75rem;line-height:1.6}
.voice-parsed .vp-row{display:flex;gap:6px;margin-bottom:3px}
.voice-parsed .vp-key{color:var(--text3);width:80px;flex-shrink:0;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
.voice-parsed .vp-val{color:var(--text);font-weight:500}
.voice-actions{display:flex;gap:8px}
.voice-actions button{flex:1;padding:8px;border-radius:var(--r);font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
.va-confirm{background:var(--gold);color:#080c12;border:none}
.va-confirm:hover{background:var(--gold2)}
.va-retry{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.va-retry:hover{border-color:var(--gold-border);color:var(--gold)}
.ai-tip{font-size:.7rem;color:var(--text3);padding:8px 10px;background:var(--bg3);border-radius:var(--r);border-left:2px solid var(--gold);line-height:1.5}
@media(max-width:480px){.ai-panel{width:calc(100vw - 32px);right:16px}}
</style>

// ─── SUPABASE API ────────────────────────────────────────────────
async function sbGet(table, filters){
  var url=SB_URL+'/rest/v1/'+table+'?select=*&apikey='+SB_KEY;
  if(filters)url+=filters;
  var r=await fetch(url,{method:'GET',headers:{'Accept':'application/json'}});
  if(!r.ok){console.error('sbGet',table,r.status);return[];}
  return await r.json();
}
async function sbUpsert(table, data){
  var rows=Array.isArray(data)?data:[data];
  if(!rows.length)return true;
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?apikey='+SB_KEY,{
    method:'POST',
    headers:{'Content-Type':'application/json','Prefer':'return=minimal,resolution=merge-duplicates'},
    body:JSON.stringify(rows)
  });
  if(!r.ok){console.error('sbUpsert',table,r.status);return false;}
  return true;
}
async function sbDelete(table, id){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id)+'&apikey='+SB_KEY,{
    method:'DELETE',headers:{}
  });
  if(!r.ok){console.error('sbDelete',table,r.status);return false;}
  return true;
}

var _realtimeChannel=null;
function startRealtime(){
  // Poll every 8 seconds for updates (simple polling, no websocket needed)
  setInterval(async function(){
    if(!STATE.cu)return;
    try{
      var tasks=await sbGet('tasks');
      var newTasks=tasks.map(taskFromDb);
      // Check if anything changed
      if(JSON.stringify(newTasks.map(t=>t.id+'_'+t.status+'_'+t.done))!==
         JSON.stringify(STATE.tasks.map(t=>t.id+'_'+t.status+'_'+t.done))){
        STATE.tasks=newTasks;
        renderPage();
      }
    }catch(e){/* silent */}
  },8000);
}

// ─── INIT & LOAD ─────────────────────────────────────────────────
async function loadFromSupabase(){
  showLoadingScreen();
  try{
    var users=await sbGet('users').catch(()=>[]);
    var tasks=await sbGet('tasks').catch(()=>[]);
    var meets=await sbGet('meetings').catch(()=>[]);
    var boards=await sbGet('mtasks').catch(()=>[]);
    var socialRows=await sbGet('social').catch(()=>[]);

    // Users
    if(users&&users.length){
      STATE.users=users.map(userFromDb);
    } else {
      // First run: seed default users
      STATE.users=[...DEFAULT_USERS];
      await sbUpsert('users',STATE.users.map(userToDb));
    }

    // Tasks
    // Tasks — Supabase single source, no seeding
    STATE.tasks = (tasks&&tasks.length) ? tasks.map(taskFromDb) : [];
    // Meetings
    STATE.meets=meets?meets.map(meetFromDb):[];

    // MT Boards
    STATE.mtasks=boards?boards.map(mtFromDb):[];

    // Social
    if(socialRows&&socialRows.length){
      var soc={};
      socialRows.forEach(r=>{soc[r.user_id]=socialFromDb(r);});
      localStorage.setItem('nika_social_v1',JSON.stringify(soc));
    }

  } catch(e){
    console.error('Supabase load error:',e);
    // Fallback to localStorage
    STATE.tasks=JSON.parse(localStorage.getItem(SK_TASKS)||'[]').map?JSON.parse(localStorage.getItem(SK_TASKS)||'[]'):[];
    STATE.users=JSON.parse(localStorage.getItem(SK_USERS)||'[]');
    STATE.meets=JSON.parse(localStorage.getItem(SK_MEETS)||'[]');
    STATE.mtasks=JSON.parse(localStorage.getItem(SK_MT)||'[]');
    showToast('⚠ Veritabanına bağlanılamadı, çevrimdışı mod','var(--red)');
  }
  hideLoadingScreen();
  startRealtime();
}

function showLoadingScreen(){
  var d=document.createElement('div');d.id='sb-loading';
  d.style.cssText='position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
  d.innerHTML='<img src="'+LOGO+'" style="height:48px;filter:drop-shadow(0 0 12px rgba(245,184,14,.5))"><div style="font-size:.9rem;color:var(--text2)">Yükleniyor...</div><div style="width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div id="sb-bar" style="width:0%;height:100%;background:var(--gold);border-radius:2px;transition:width 1.5s ease"></div></div>';
  document.body.appendChild(d);
  setTimeout(()=>{var b=document.getElementById('sb-bar');if(b)b.style.width='85%';},100);
}
function hideLoadingScreen(){
  var d=document.getElementById('sb-loading');
  if(d){var b=document.getElementById('sb-bar');if(b)b.style.width='100%';setTimeout(()=>d.remove(),400);}
}

// Central avatar renderer — always use this
function avatarHTML(u, sizePx, extraStyle){
  if(!u){return '<div style="width:'+sizePx+'px;height:'+sizePx+'px;background:var(--bg3);border-radius:50%;flex-shrink:0;'+(extraStyle||'')+'"></div>';}
  var fs=Math.round(sizePx*0.36);
  var photo=u.photo||'';
  var cls=avCls(u.role);
  var ini=u.initials||'?';
  var ext=extraStyle||'';
  if(photo){
    var fallback='<div class=\'av '+cls+'\' style=\'width:'+sizePx+'px;height:'+sizePx+'px;font-size:'+fs+'px;flex-shrink:0;'+ext+'\'>'+(ini||'?')+'<\/div>';
    return '<div style="width:'+sizePx+'px;height:'+sizePx+'px;border-radius:50%;overflow:hidden;flex-shrink:0;'+ext+'">'
      +'<img src="'+photo+'" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display=\'none\';this.parentElement.insertAdjacentHTML(\'afterend\',\''+fallback+'\');this.parentElement.remove()">'
      +'</div>';
  }
  return '<div class="av '+cls+'" style="width:'+sizePx+'px;height:'+sizePx+'px;font-size:'+fs+'px;flex-shrink:0;'+ext+'">'+ini+'</div>';
}
const roleName=r=>r==='patron'?'Patron':r==='koordinator'?'Koordinatör':'Mühendis';
const canManage=u=>u&&(u.role==='patron'||u.role==='koordinator');
const getCat=id=>CATEGORIES.find(c=>c.id===id);
function getCatOverdue(catId){
  var ov=STATE.tasks.filter(function(t){return t.categoryId===catId&&!t.done&&t.deadline&&isLate(t.deadline);}).length;
  return ov>0?'<span style="color:var(--red)">&#9888; '+ov+' gecikmi&#351;</span>':'';
}
const fileIcon=n=>{const e=(n||'').split('.').pop().toLowerCase();if(['jpg','jpeg','png','gif','webp','svg'].includes(e))return'🖼';if(['pdf'].includes(e))return'📄';if(['doc','docx'].includes(e))return'📝';if(['xls','xlsx'].includes(e))return'📊';if(['zip','rar'].includes(e))return'🗜';if(['mp4','avi','mov'].includes(e))return'🎬';return'📎';};
function fmtSize(bytes){if(!bytes)return'';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB';}

  const u={id:genId(),name,email,role,password_hash:pass,initials:name.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2),photo:null,notif_email:true,notif_teams:false,teams_webhook:'',created_at:new Date().toISOString()};

function doLogin(){
  const email=document.getElementById('li-email')?.value.trim();
  const pass=document.getElementById('li-pass')?.value.trim();

  sS(STATE.cu);STATE.page='tasks';render();
}

function renderTasksPage(el,showAll){

  tasks=tasks.filter(t=>!t.recurring);
  el.innerHTML=`
  <div class="pg-hdr">

    ${canManage(STATE.cu)?`<button class="add-btn" onclick="openTaskModal(null,false)">＋ Görev Ekle</button>`:''}
  </div>
  <div class="filter-bar">
    <select class="fsel" id="f-stat" onchange="applyFilters()">
      <option value="all">Tüm Durumlar</option>
      ${TASK_STATUSES.map(s=>`<option value="${s.id}">${s.icon} ${s.label}</option>`).join('')}
    </select>
    <select class="fsel" id="f-cat" onchange="applyFilters()">
      <option value="all">Tüm Kategoriler</option>
      ${CATEGORIES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      <option value="none">Kategorisiz</option>
    </select>
    ${showAll?`<select class="fsel" id="f-ass" onchange="applyFilters()">
      <option value="all">Tüm Kişiler</option>
      ${STATE.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}
    </select>`:''}
    <input class="fsearch" id="f-srch" placeholder="Ara..." oninput="applyFilters()">
  </div>
  <div id="task-list">${renderTaskList(tasks,showAll)}</div>`;
}

function applyFilters(){
  const stat=document.getElementById('f-stat')?.value||'all';
  const cat=document.getElementById('f-cat')?.value||'all';
  const ass=document.getElementById('f-ass')?.value||'all';
  const srch=(document.getElementById('f-srch')?.value||'').toLowerCase();
  const showAll=STATE.page==='all-tasks';
  let tasks=showAll?STATE.tasks:STATE.tasks.filter(t=>t.assignees&&t.assignees.includes(STATE.cu.id));
  tasks=tasks.filter(t=>!t.recurring);
  if(stat!=='all')tasks=tasks.filter(t=>(t.status||'bekliyor')===stat||(stat==='tamamlandi'&&t.done));
  if(cat==='none')tasks=tasks.filter(t=>!t.categoryId);
  else if(cat!=='all')tasks=tasks.filter(t=>t.categoryId===cat);
  if(ass!=='all')tasks=tasks.filter(t=>t.assignees&&t.assignees.includes(ass));
  if(srch)tasks=tasks.filter(t=>(t.title||'').toLowerCase().includes(srch)||(t.description||'').toLowerCase().includes(srch));
  const tl=document.getElementById('task-list');
  if(tl)tl.innerHTML=renderTaskList(tasks,showAll);
}

function renderTaskList(tasks,showAll){
  tasks=[...tasks].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    return 0;
  });
  return tasks.length?tasks.map(t=>taskCardHTML(t)).join(''):`<div class="empty"><div class="empty-icon">✓</div>Görev bulunamadı</div>`;
}

// ─── TASK CARD ────────────────────────────────────────────────────
function getStatus(t){
  if(t.status)return TASK_STATUSES.find(s=>s.id===t.status)||TASK_STATUSES[0];
  if(t.done)return TASK_STATUSES[2];
  return TASK_STATUSES[0];
}
function taskCardHTML(t,isSubtask){
  const st=getStatus(t);
  const late=st.id!=='tamamlandi'&&st.id!=='iptal'&&isLate(t.deadline);
  const assignees=(t.assignees||[]).map(gU).filter(Boolean);
  const cat=getCat(t.categoryId);
  const files=t.files||[];
  const cmts=t.comments||[];
  const subtasks=t.subtasks||[];
  const subDone=subtasks.filter(s=>s.done).length;
  const subPct=subtasks.length?Math.round(subDone/subtasks.length*100):0;
  const isOC=STATE.openCmts[t.id];
  const isOF=STATE.openFiles[t.id];
  const isOS=STATE.openSubs&&STATE.openSubs[t.id];
  const canAct=canManage(STATE.cu)||(t.assignees&&t.assignees.includes(STATE.cu.id));
  const indent=isSubtask?'margin-left:12px;border-left:2px solid var(--gold-border);':'';
  return`<div class="task-card ${st.id==='tamamlandi'||st.id==='iptal'?'done-card':''}" id="tc-${t.id}" style="${indent}">
    <div class="tc-row">
      <div class="tc-left">
        <div class="pbar pb-${t.priority==='high'?'h':t.priority==='low'?'l':'m'}"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
            <div class="tc-title ${st.id==='tamamlandi'||st.id==='iptal'?'done':''}" style="margin-bottom:0">${esc(t.title)}</div>
            <div style="position:relative;flex-shrink:0">
              <span class="st-badge ${st.cls}" onclick="toggleStDrop('${t.id}')">${st.icon} ${st.label} ▾</span>
              <div class="st-drop" id="std-${t.id}" style="display:none">
                ${TASK_STATUSES.map(s=>`<div class="st-drop-item" onclick="setTaskStatus('${t.id}','${s.id}')"><span>${s.icon}</span><span>${s.label}</span></div>`).join('')}
              </div>
            </div>
          </div>
          ${t.description?`<div class="tc-desc">${esc(t.description)}</div>`:''}
          ${subtasks.length?`<div class="sub-prog"><div class="sub-prog-fill" style="width:${subPct}%"></div></div>
          <div style="font-size:.65rem;color:var(--text3);margin-top:2px">${subDone}/${subtasks.length} alt görev</div>`:''}
          <div class="tc-meta" style="margin-top:5px">
            <div class="atag-row" style="margin-bottom:${assignees.length?'3px':'0'}">${assignees.length?assignees.map(u=>`<span class="atag" style="border-color:${u.role==='patron'?'#9a3412':u.role==='koordinator'?'#1d4ed8':'#15803d'}33">${avatarHTML(u,16)}<span style="font-size:.7rem">${esc(u.name)}</span></span>`).join(''):'<span style="font-size:.68rem;color:var(--text3)">Atanmamış</span>'}</div>
            ${t.deadline?`<span class="tag t-dl ${late?'late':''}">${late?'⚠ ':''}${fmtD(t.deadline)}</span>`:'<span class="tag t-dl" style="opacity:.5">Süresiz</span>'}
            ${cat?`<span class="tag t-cat" style="background:${cat.color}22;color:${cat.color}">${cat.name}</span>`:''}
            ${t.recurring?`<span class="tag t-rec">↻ Aylık</span>`:''}
            ${files.length?`<span class="tag t-file" onclick="toggleFiles('${t.id}')">📎 ${files.length}</span>`:''}
          </div>
        </div>
      </div>
      ${canManage(STATE.cu)?`<div class="tc-actions">
        <button class="ib" onclick="openTaskModal('${t.id}',${!!t.recurring})" title="Düzenle">✏</button>
        <button class="ib" onclick="openSubtaskModal('${t.id}')" title="Alt Görev Ekle" style="font-size:10px">+⊂</button>
        <button class="ib del" onclick="delTask('${t.id}')">✕</button>
      </div>`:''}
    </div>
    <div class="tc-foot">
      <span class="cmmt-tog" onclick="toggleCmts('${t.id}')">💬 ${cmts.length}${isOC?' ▴':' ▾'}</span>
      ${subtasks.length?`<span class="cmmt-tog" onclick="toggleSubs('${t.id}')" style="color:var(--gold)">⊂ ${subtasks.length} alt görev${isOS?' ▴':' ▾'}</span>`:''}
      ${canAct?`<span class="file-tog" onclick="toggleFiles('${t.id}')">📎${isOF?' ▴':' ▾'}</span>`:''}
    </div>
    ${isOC?cmtsHTML(t):''}
    ${isOF?filesHTML(t):''}
    ${isOS?subtasksHTML(t):''}
  </div>`;
}

function toggleDone(id){
  const t=STATE.tasks.find(x=>x.id===id);if(!t)return;
  if(!canManage(STATE.cu)&&!(t.assignees&&t.assignees.includes(STATE.cu.id)))return;
  t.done=!t.done;t.status=t.done?'tamamlandi':'bekliyor';
  svTasks();
  const el=document.getElementById('tc-'+id);if(el)el.outerHTML=taskCardHTML(t);
}
function delTask(id){
  if(!confirm('Görevi sil?'))return;
  STATE.tasks = STATE.tasks.filter(t=>t.id!==id);
  sbDelete('tasks',id);
  renderPage();
}
function toggleStDrop(id){
  const d=document.getElementById('std-'+id);
  if(!d)return;
  // close all others
  document.querySelectorAll('.st-drop').forEach(x=>{if(x.id!=='std-'+id)x.style.display='none';});
  d.style.display=d.style.display==='none'?'block':'none';
}
function setTaskStatus(id,statusId){
  const t=STATE.tasks.find(x=>x.id===id);if(!t)return;
  t.status=statusId;t.done=statusId==='tamamlandi';
  svTasks();
  document.querySelectorAll('.st-drop').forEach(x=>x.style.display='none');
  const el=document.getElementById('tc-'+id);if(el)el.outerHTML=taskCardHTML(t);
}
// Close dropdowns on outside click
document.addEventListener('click',function(e){
  if(!e.target.closest('.st-badge')&&!e.target.closest('.st-drop')){
    document.querySelectorAll('.st-drop').forEach(x=>x.style.display='none');
  }
});
// Subtasks
if(!STATE.openSubs)STATE.openSubs={};
function toggleSubs(id){
  STATE.openSubs[id]=!STATE.openSubs[id];
  const t=STATE.tasks.find(x=>x.id===id);
  const el=document.getElementById('tc-'+id);if(t&&el)el.outerHTML=taskCardHTML(t);
}
function subtasksHTML(t){
  const subs=t.subtasks||[];
  return`<div class="subtask-area">
    <div style="font-size:.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">⊂ Alt Görevler</div>

function sendReaction(toUid,rxnId){
  if(toUid===STATE.cu.id)return;
  const d=getSocial();
  // Target user reactions
  if(!d[toUid])d[toUid]={};
  if(!d[toUid].reactions)d[toUid].reactions={};
  // Track who sent what (one reaction per person per user - can change)
  if(!d[STATE.cu.id])d[STATE.cu.id]={};
  if(!d[STATE.cu.id].sentReactions)d[STATE.cu.id].sentReactions={};
  const prev=d[STATE.cu.id].sentReactions[toUid];
  // Remove old reaction count
  if(prev&&d[toUid].reactions[prev]>0)d[toUid].reactions[prev]--;
  // Set new (toggle off if same)
  if(prev===rxnId){
    delete d[STATE.cu.id].sentReactions[toUid];
  } else {
    d[toUid].reactions[rxnId]=(d[toUid].reactions[rxnId]||0)+1;
    d[STATE.cu.id].sentReactions[toUid]=rxnId;
  }
  saveSocial(d);
  // Animate button
  const btn=document.getElementById('rxn-'+toUid+'-'+rxnId);
  if(btn){btn.style.transform='scale(1.4)';setTimeout(()=>{btn.style.transform='';},200);}
  // Re-render just that card
  const users=STATE.users.length?STATE.users:ld(SK_USERS,[]);
  const u=users.find(x=>x.id===toUid);
  const STATUS_OPTS=[{v:'',e:'',l:'Durum yok'},{v:'focus',e:'🎯',l:'Odaklanıyorum'},{v:'meeting',e:'📅',l:'Toplantıdayım'},{v:'wfh',e:'🏠',l:'Evden çalışıyorum'},{v:'brb',e:'☕',l:'Kısa mola'},{v:'busy',e:'🔥',l:'Yoğunum'},{v:'pto',e:'🌴',l:'İzindeyim'}];
  const card=document.getElementById('pc-'+toUid);
  if(u&&card)card.outerHTML=personCardHTML(u,d,STATUS_OPTS);
}

function quickAddCard(bid,cid){

  if(!inp)return;const title=inp.value.trim();if(!title)return;
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  const col=(b.columns||[]).find(x=>x.id===cid);if(!col)return;
  if(!col.cards)col.cards=[];

// Drag & drop
var _dragCard=null;
function dropCard(e,bid,toCid){
  if(!_dragCard)return;
  const {fromBid,fromCid,cardId}=_dragCard;
  if(fromBid!==bid)return;
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  const fromCol=(b.columns||[]).find(x=>x.id===fromCid);
  const toCol=(b.columns||[]).find(x=>x.id===toCid);
  if(!fromCol||!toCol||fromCid===toCid)return;
  const idx=(fromCol.cards||[]).findIndex(x=>x.id===cardId);if(idx<0)return;
  const [card]=fromCol.cards.splice(idx,1);
  if(!toCol.cards)toCol.cards=[];
  toCol.cards.push(card);
  if(toCol.type==='done')card.done=true;
  svMT();renderPage();_dragCard=null;
}
function toggleCardDone(bid,cid,cardId){
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  const col=(b.columns||[]).find(x=>x.id===cid);if(!col)return;
  const card=(col.cards||[]).find(x=>x.id===cardId);if(!card)return;
  card.done=!card.done;svMT();renderPage();
}
function moveCard(bid,cid,cardId,dir){
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  const col=(b.columns||[]).find(x=>x.id===cid);if(!col)return;
  const idx=(col.cards||[]).findIndex(x=>x.id===cardId);if(idx<0)return;
  const ni=idx+dir;if(ni<0||ni>=col.cards.length)return;
  [col.cards[idx],col.cards[ni]]=[col.cards[ni],col.cards[idx]];
  svMT();renderPage();
}
function delCard(bid,cid,cardId){
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  const col=(b.columns||[]).find(x=>x.id===cid);if(!col)return;
  col.cards=(col.cards||[]).filter(x=>x.id!==cardId);svMT();renderPage();
}
function delCol(bid,cid){
  if(!confirm('Sütun ve kartları silinsin mi?'))return;
  const b=STATE.mtasks.find(x=>x.id===bid);if(!b)return;
  b.columns=(b.columns||[]).filter(x=>x.id!==cid);svMT();renderPage();
}
function delBoard(id){
  if(!confirm('Pano silinsin mi?'))return;
  STATE.mtasks=STATE.mtasks.filter(x=>x.id!==id);svMT();STATE.mtSub=null;renderPage();
}

function saveMeet(id){
  const title=document.getElementById('mm-t')?.value.trim();
  const date=document.getElementById('mm-d')?.value;
  if(!title||!date){alert('Başlık ve tarih zorunlu');return}
  const attendees=[...document.querySelectorAll('#meet-ov input[type=checkbox][id^=mm-a-]:checked')].map(x=>x.value);
  const meetType=document.getElementById('mm-type')?.value||'yüz-yüze';
  const data={title,date,time:document.getElementById('mm-h')?.value||null,location:document.getElementById('mm-loc')?.value.trim()||null,notes:document.getElementById('mm-notes')?.value.trim()||null,attendees,meetType};
  if(meetType==='teams'){simulateTeamsInvite(title,date,document.getElementById('mm-h')?.value,attendees);}
  if(id){const i=STATE.meets.findIndex(x=>x.id===id);if(i>-1)STATE.meets[i]={...STATE.meets[i],...data}}
  else STATE.meets.push({id:genId(),createdBy:STATE.cu.id,...data});
  svMeets();closeOv('meet-ov');renderPage();
}
function toggleMeetLocation(type){
  const locWrap=document.getElementById('mm-loc-wrap');
  const teamsInfo=document.getElementById('mm-teams-info');
  if(!locWrap||!teamsInfo)return;
  if(type==='teams'){locWrap.style.display='none';teamsInfo.style.display='block';}
  else{locWrap.style.display='block';teamsInfo.style.display='none';}
}
function simulateTeamsInvite(title,date,time,attendees){
  const names=(attendees||[]).map(id=>STATE.users.find(u=>u.id===id)?.name||id).join(', ');
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blue-bg);border:1px solid rgba(56,189,248,.4);border-radius:var(--r);padding:12px 18px;font-size:.78rem;color:var(--blue);z-index:9999;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:360px;line-height:1.5';
  toast.innerHTML='💬 <strong>Teams toplantısı simülasyonu</strong><br>'+esc(title)+' · '+esc(date||'')+(time?' '+esc(time):'')+'<br><span style="font-size:.7rem;opacity:.8">Katılımcılar: '+esc(names||'—')+'</span>';
  document.body.appendChild(toast);setTimeout(()=>toast.remove(),5000);
}

function uploadPhoto(input){
  const file=input.files[0];if(!file)return;
  if(file.size>10*1024*1024){alert('Fotoğraf 10MB den küçük olmalı');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    // Compress to max 200x200 for storage
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=200;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.85);
      const idx=STATE.users.findIndex(u=>u.id===STATE.cu.id);
      if(idx>-1){STATE.users[idx].photo=b64;STATE.cu=STATE.users[idx];sS(STATE.cu);}
      svUsers();
      showToast('✓ Profil fotoğrafı güncellendi');
      renderShell();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── MODAL VOICE FILL ────────────────────────────────────────────
var _modalRec={recording:false,mr:null,chunks:[]};
function startModalRec(){
  if(_modalRec.recording)return;
  const key=localStorage.getItem('nika_oai_key')||'';
  if(!key){document.getElementById('modal-voice-status').textContent='⚠ AI panelinden OpenAI key girin';return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    _modalRec.chunks=[];
    _modalRec.mr=new MediaRecorder(stream);
    _modalRec.mr.ondataavailable=function(e){if(e.data.size>0)_modalRec.chunks.push(e.data);};
    _modalRec.mr.start(100);
    _modalRec.recording=true;
    const btn=document.getElementById('modal-mic-btn');
    const st=document.getElementById('modal-voice-status');
    if(btn)btn.style.background='var(--red)';
    if(st)st.textContent='Kayıt yapılıyor...';
  }).catch(function(){document.getElementById('modal-voice-status').textContent='⚠ Mikrofon erişimi yok';});
}
function stopModalRec(){
  if(!_modalRec.recording||!_modalRec.mr)return;
  _modalRec.recording=false;
  const st=document.getElementById('modal-voice-status');
  const btn=document.getElementById('modal-mic-btn');
  if(st)st.textContent='İşleniyor...';
  if(btn){btn.style.background='var(--gold)';btn.disabled=true;}
  _modalRec.mr.onstop=function(){
    const blob=new Blob(_modalRec.chunks,{type:'audio/webm'});
    const key=localStorage.getItem('nika_oai_key')||'';
    const form=new FormData();
    form.append('file',blob,'voice.webm');form.append('model','whisper-1');form.append('language','tr');
    fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:'Bearer '+key},body:form})
    .then(function(r){return r.json();}).then(function(d){
      if(d.error){if(st)st.textContent='⚠ '+d.error.message;if(btn)btn.disabled=false;return;}
      const text=d.text||'';
      if(st)st.textContent='Claude analiz ediyor...';
      const userNames=STATE.users.map(function(u){return u.name;}).join(', ');
      const catNames=CATEGORIES.map(function(c){return c.name;}).join(', ');
      const sys='Sesli nottan gorev bilgilerini cikar. SADECE JSON formatinda yanitla:\n{"title":"","description":"","assignees":[""],"category":"","deadline":"YYYY-MM-DD veya null","priority":"low|mid|high"}\nEkip: '+userNames+'\nKategoriler: '+catNames+'\nBugun: '+new Date().toISOString().slice(0,10);
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:[{role:'user',content:'Sesli not: "'+text+'"'}]})})
      .then(function(r){return r.json();}).then(function(d2){
        if(d2.error){if(st)st.textContent='⚠ '+d2.error.message;if(btn)btn.disabled=false;return;}
        try{
          var raw=(d2.content&&d2.content[0]&&d2.content[0].text)||'';
          var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
          var tf=document.getElementById('tm-t');if(tf&&parsed.title)tf.value=parsed.title;
          var df=document.getElementById('tm-d');if(df&&parsed.description)df.value=parsed.description;
          var dlf=document.getElementById('tm-dl');if(dlf&&parsed.deadline)dlf.value=parsed.deadline;
          var pf=document.getElementById('tm-p');if(pf&&parsed.priority)pf.value=parsed.priority;
          // Check assignees
          if(parsed.assignees&&parsed.assignees.length){
            STATE.users.forEach(function(u){
              var cb=document.getElementById('ms-'+u.id);if(!cb)return;
              var match=parsed.assignees.some(function(n){return u.name.toLowerCase().indexOf(n.toLowerCase())>-1||n.toLowerCase().indexOf(u.name.split(' ')[0].toLowerCase())>-1;});
              cb.checked=match;
            });
          }
          // Match category
          if(parsed.category){
            var catSel=document.getElementById('tm-cat');
            if(catSel){var cm=CATEGORIES.find(function(c){return c.name.toLowerCase().indexOf(parsed.category.toLowerCase())>-1;});if(cm)catSel.value=cm.id;}
          }
          if(st)st.textContent='✓ Dolduruldu!';
          setTimeout(function(){if(st)st.textContent='';},3000);
        }catch(ex){if(st)st.textContent='⚠ Parse hatası';}
        if(btn)btn.disabled=false;
      }).catch(function(e){if(st)st.textContent='⚠ '+e.message;if(btn)btn.disabled=false;});
    }).catch(function(e){if(st)st.textContent='⚠ '+e.message;if(btn)btn.disabled=false;});
  };
  _modalRec.mr.stop();_modalRec.mr.stream.getTracks().forEach(function(t){t.stop();});
}

      return c.name+': '+ct+' gorev ('+dn+' tamamlandi)';
    }).join(', ');
    var boardLines=STATE.mtasks.map(function(b){
      var cols=(b.columns||[]).map(function(c){return c.name+'('+((c.cards||[]).length)+')'}).join(', ');
      return '- Pano: "'+b.name+'" | '+cols;
    }).join('\n');
    return 'Sen NIKA BIM & DC Management sirketinin AI asistanisin. Turkce yanitla. Bugun: '+today+'.\n\nEKIP: '+(users||'Kayitli kullanici yok.')+'\n\nKATEGORILER: '+catLines+'\n\nGOREVLER ('+STATE.tasks.length+' toplam):\n'+(taskLines||'Gorev yok.')+'\n\nMULTI-TASK PANOLAR:\n'+(boardLines||'Pano yok.')+'\n\nKullanici sorularinda bu verileri kullan. Analiz, ozet ve oneri sunabilirsin.';
  }

  function callClaude(messages, system, cb){
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:system,messages:messages})
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error)cb(null,d.error.message);
      else cb((d.content&&d.content[0]&&d.content[0].text)||'',null);
    }).catch(function(e){cb(null,e.message)});
  }

  function whisper(blob, cb){
    var key=AI.whisperKey;
    if(!key){cb(null,'OpenAI API key girilmedi');return;}
    var form=new FormData();
    form.append('file',blob,'voice.webm');
    form.append('model','whisper-1');
    form.append('language','tr');
    fetch('https://api.openai.com/v1/audio/transcriptions',{
      method:'POST',headers:{Authorization:'Bearer '+key},body:form
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error)cb(null,d.error.message);
      else cb(d.text||'',null);
    }).catch(function(e){cb(null,e.message)});
  }

  function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmtMsg(t){return escH(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

  function paint(){
    var fab=document.getElementById('ai-fab');
    var panel=document.getElementById('ai-panel');
    if(!STATE.cu){if(fab)fab.remove();if(panel)panel.remove();return;}
    if(!fab){
      fab=document.createElement('button');
      fab.id='ai-fab';fab.className='ai-fab';fab.title='AI Asistan';
      fab.onclick=function(){AI.open=!AI.open;paint();};
      document.body.appendChild(fab);
    }
    fab.innerHTML=AI.open?'✕':'🤖';
    if(!AI.open){if(panel)panel.remove();return;}
    if(!panel){panel=document.createElement('div');panel.id='ai-panel';panel.className='ai-panel';document.body.appendChild(panel);}
    panel.innerHTML=
      '<div class="ai-panel-hdr">'+
        '<div class="ai-logo">\u2726</div>'+
        '<h4>NIKA AI Asistan</h4>'+
        '<span class="ai-model">claude-sonnet-4</span>'+
        '<button class="close-btn" id="ai-cls">\u2715</button>'+
      '</div>'+
      '<div class="ai-tabs">'+
        '<div class="ai-tab'+(AI.tab==='chat'?' active':'')+'" id="tab-chat">&#128172; Chat</div>'+
        '<div class="ai-tab'+(AI.tab==='voice'?' active':'')+'" id="tab-voice">&#127897; Sesli G\u00f6rev</div>'+
      '</div>'+
      '<div class="ai-body" id="ai-body">'+
        (AI.tab==='chat'?chatHTML():voiceHTML())+
      '</div>';

    document.getElementById('ai-cls').onclick=function(){AI.open=false;paint();};
    document.getElementById('tab-chat').onclick=function(){AI.tab='chat';paint();};
    document.getElementById('tab-voice').onclick=function(){AI.tab='voice';paint();};

    if(AI.tab==='chat'){
      var msgs=document.getElementById('chat-msgs');
      if(msgs)msgs.scrollTop=msgs.scrollHeight;
      var inp=document.getElementById('chat-inp');
      if(inp){
        inp.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';};
        inp.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}};
      }
      var sendbtn=document.getElementById('chat-send');
      if(sendbtn)sendbtn.onclick=doSend;
    }
    if(AI.tab==='voice'){
      var saveBtn=document.getElementById('oai-save');
      if(saveBtn)saveBtn.onclick=saveKey;
      var micBtn=document.getElementById('mic-btn');
      if(micBtn){
        micBtn.onmousedown=micBtn.ontouchstart=startRec;
        micBtn.onmouseup=micBtn.ontouchend=stopRec;
      }
      var retryBtn=document.getElementById('voice-retry');
      if(retryBtn)retryBtn.onclick=function(){AI.parsed=null;AI.transcript='';AI.voiceStatus='';paint();};
      var confirmBtn=document.getElementById('voice-confirm');
      if(confirmBtn)confirmBtn.onclick=confirmTask;
    }
  }

  function chatHTML(){
    var welcome=AI.chatHistory.length===0?
      '<div class="msg ai">Merhaba! NIKA AI asistan\u0131y\u0131m. G\u00f6rev verilerine eri\u015fimim var.<br><br>'+
      '&bull; "Bu hafta geciken g\u00f6revler?"<br>&bull; "EIB kategorisi nas\u0131l?"<br>'+
      '&bull; "Ekip \u00f6zeti ver"<br>&bull; "Kim en \u00e7ok g\u00f6reve sahip?"</div>':'';
    var msgs=AI.chatHistory.map(function(m){
      return '<div class="msg '+(m.role==='user'?'user':'ai')+'">'+fmtMsg(m.content)+'</div>';
    }).join('');
    var thinking=AI.processing?'<div class="msg ai thinking">Analiz ediliyor...</div>':'';
    return '<div class="chat-msgs" id="chat-msgs">'+welcome+msgs+thinking+'</div>'+
      '<div class="chat-input-row">'+
        '<textarea id="chat-inp" placeholder="Soru sor..." rows="1"></textarea>'+
        '<button class="chat-send" id="chat-send"'+(AI.processing?' disabled':'')+'><span>&#10148;</span></button>'+
      '</div>';
  }

  function doSend(){
    var inp=document.getElementById('chat-inp');
    if(!inp||AI.processing)return;
    var text=inp.value.trim();
    if(!text)return;
    inp.value='';inp.style.height='auto';
    AI.chatHistory.push({role:'user',content:text});
    AI.processing=true;paint();
    callClaude(AI.chatHistory.map(function(m){return{role:m.role,content:m.content};}),buildCtx(),function(reply,err){
      AI.chatHistory.push({role:'assistant',content:err?'\u26a0 Hata: '+err:reply});
      AI.processing=false;paint();
    });
  }

  function voiceHTML(){
    var parsedBlock='';
    if(AI.parsed){
      var p=AI.parsed;
      parsedBlock=
        '<div>'+
          '<div style="font-size:.68rem;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">\u2726 Olu\u015fturulacak G\u00f6rev</div>'+
          '<div class="voice-parsed">'+
            '<div class="vp-row"><span class="vp-key">Ba\u015fl\u0131k</span><span class="vp-val">'+escH(p.title||'\u2014')+'</span></div>'+
            '<div class="vp-row"><span class="vp-key">A\u00e7\u0131klama</span><span class="vp-val">'+escH(p.description||'\u2014')+'</span></div>'+
            '<div class="vp-row"><span class="vp-key">Ki\u015filer</span><span class="vp-val">'+escH((p.assignees||[]).join(', ')||'\u2014')+'</span></div>'+
            '<div class="vp-row"><span class="vp-key">Kategori</span><span class="vp-val">'+escH(p.category||'\u2014')+'</span></div>'+
            '<div class="vp-row"><span class="vp-key">Deadline</span><span class="vp-val">'+(p.deadline?fmtD(p.deadline):'S\u00fcresiz')+'</span></div>'+
            '<div class="vp-row"><span class="vp-key">\u00d6ncelik</span><span class="vp-val">'+(p.priority==='high'?'\uD83D\uDD34 Y\u00fcksek':p.priority==='low'?'\uD83D\uDFE2 D\u00fc\u015f\u00fck':'\uD83D\uDFE1 Orta')+'</span></div>'+
          '</div>'+
          '<div class="voice-actions" style="margin-top:8px">'+
            '<button class="va-retry" id="voice-retry">\u21ba Tekrar</button>'+
            '<button class="va-confirm" id="voice-confirm">\u2713 G\u00f6revi Olu\u015ftur</button>'+
          '</div>'+
        '</div>';
    }
    var transcriptBlock=AI.transcript?
      '<div><div style="font-size:.68rem;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Transkript</div>'+
      '<div class="voice-transcript">'+escH(AI.transcript)+'</div></div>':'';

    return '<div class="voice-body">'+
      '<div><div style="font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">OpenAI API Key (Whisper)</div>'+
        '<div class="voice-key-row"><input type="password" id="oai-key" value="'+escH(AI.whisperKey)+'" placeholder="sk-..."><button id="oai-save">Kaydet</button></div></div>'+
      '<div class="ai-tip">&#127897; Bas\u0131l\u0131 tutun, g\u00f6revi anlat\u0131n, b\u0131rak\u0131n.<br>'+
        '<em>\u00d6rnek: "Ahmet\'e EIB i\u00e7in Cuma\'ya kadar Revit modeli haz\u0131rla"</em></div>'+
      '<button class="mic-btn '+(AI.recording?'recording':AI.processing?'processing':'idle')+'" id="mic-btn">'+
        (AI.recording?'&#9209;':AI.processing?'&#8987;':'&#127897;')+
      '</button>'+
      '<div class="voice-status">'+escH(AI.voiceStatus||(AI.recording?'Kay\u0131t yap\u0131l\u0131yor...':'Bas\u0131l\u0131 tutun'))+'</div>'+
      transcriptBlock+parsedBlock+
    '</div>';
  }

  function saveKey(){
    var key=document.getElementById('oai-key').value.trim();
    AI.whisperKey=key;localStorage.setItem('nika_oai_key',key);
    AI.voiceStatus='\u2713 Key kaydedildi';paint();
    setTimeout(function(){AI.voiceStatus='';paint();},2000);
  }

  function startRec(e){
    e.preventDefault();
    if(AI.recording||AI.processing)return;
    if(!AI.whisperKey){AI.voiceStatus='\u26a0 \u00d6nce OpenAI API key girin';paint();return;}
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      AI.audioChunks=[];
      AI.mediaRecorder=new MediaRecorder(stream);
      AI.mediaRecorder.ondataavailable=function(e){if(e.data.size>0)AI.audioChunks.push(e.data);};
      AI.mediaRecorder.start(100);
      AI.recording=true;AI.transcript='';AI.parsed=null;AI.voiceStatus='';paint();
    }).catch(function(){AI.voiceStatus='\u26a0 Mikrofon eri\u015fimi reddedildi';paint();});
  }

  function stopRec(e){
    e.preventDefault();
    if(!AI.recording||!AI.mediaRecorder)return;
    AI.recording=false;AI.processing=true;AI.voiceStatus='Ses i\u015fleniyor...';paint();
    AI.mediaRecorder.onstop=function(){
      var blob=new Blob(AI.audioChunks,{type:'audio/webm'});
      AI.voiceStatus='Whisper ile yaz\u0131ya \u00e7evriliyor...';paint();
      whisper(blob,function(text,err){
        if(err){AI.voiceStatus='\u26a0 Whisper hatas\u0131: '+err;AI.processing=false;paint();return;}
        AI.transcript=text;
        AI.voiceStatus='Claude ile g\u00f6rev ayr\u0131\u015ft\u0131r\u0131l\u0131yor...';paint();
        var userNames=STATE.users.map(function(u){return u.name;}).join(', ');
        var catNames=CATEGORIES.map(function(c){return c.name;}).join(', ');
        var sys='Sen bir gorev ayristirma asistanisin. Verilen Turkce sesli metinden gorev bilgilerini cikar ve SADECE asagidaki JSON formatinda yanit ver, baska hicbir sey yazma:\n{"title":"gorev basligi","description":"aciklama veya bos","assignees":["isim1"],"category":"kategori veya bos","deadline":"YYYY-MM-DD veya null","priority":"low|mid|high","recurring":false}\n\nMevcut ekip: '+userNames+'\nMevcut kategoriler: '+catNames+'\nBugun: '+new Date().toISOString().slice(0,10)+'\n\nTarih ifadelerini gercek tarihe cevir. Isim eslestirmede kismi eslestirme yap. Oncelik belirtilmezse "mid" kullan.';
        callClaude([{role:'user',content:'Sesli not: "'+text+'"'}],sys,function(raw,err2){
          if(err2){AI.voiceStatus='\u26a0 Parse hatas\u0131: '+err2;AI.processing=false;paint();return;}
          try{
            var clean=raw.replace(/```json|```/g,'').trim();
            AI.parsed=JSON.parse(clean);
            AI.voiceStatus='';
          }catch(ex){AI.voiceStatus='\u26a0 JSON parse hatas\u0131: '+raw.slice(0,80);}
          AI.processing=false;paint();
        });
      });
    };
    AI.mediaRecorder.stop();
    AI.mediaRecorder.stream.getTracks().forEach(function(t){t.stop();});
  }

  function confirmTask(){
    if(!AI.parsed)return;
    var p=AI.parsed;
    var assignees=(p.assignees||[]).map(function(name){
      var u=STATE.users.find(function(u){
        return u.name.toLowerCase().indexOf(name.toLowerCase())>-1||
               name.toLowerCase().indexOf(u.name.split(' ')[0].toLowerCase())>-1;
      });
      return u?u.id:null;
    }).filter(Boolean);
    var catMatch=p.category?CATEGORIES.find(function(c){
      return c.name.toLowerCase().indexOf(p.category.toLowerCase())>-1||
             p.category.toLowerCase().indexOf(c.name.toLowerCase())>-1;
    }):null;
    var task={id:genId(),done:false,createdBy:STATE.cu.id,createdAt:new Date().toISOString(),
      comments:[],files:[],lastRenewMonth:thisMonth(),
      title:p.title||'Sesli g\u00f6rev',description:p.description||'',
      assignees:assignees.length?assignees:[STATE.cu.id],
      categoryId:catMatch?catMatch.id:null,deadline:p.deadline||null,
      priority:p.priority||'mid',recurring:!!p.recurring,imageUrl:null,voiceCreated:true};
    STATE.tasks.push(task);svTasks();
    AI.parsed=null;AI.transcript='';AI.voiceStatus='';AI.open=false;
    paint();STATE.page='all-tasks';renderPage();
    var toast=document.createElement('div');
    toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green-bg);border:1px solid var(--green);border-radius:var(--r);padding:10px 18px;font-size:.8rem;color:var(--green);z-index:9999;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap';
    toast.textContent='\u2713 "'+task.title+'" g\u00f6revi olu\u015fturuldu';
    document.body.appendChild(toast);setTimeout(function(){toast.remove();},3000);
  }

  // Hook into render cycle without redeclaring
  var origRenderPage=window.renderPage;
  window.renderPage=function(){origRenderPage();paint();};
  var origRender=window.render;
  window.render=function(){origRender();paint();};
  window._aipaint=paint;

})();
</script>

<script>
// Cache-busting: Service Worker cache'i temizle
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister();});
  });
}
// LocalStorage'daki cache'i temizle (force reload)
window.addEventListener('load', function(){
  if(localStorage.getItem('_nika_cache_v') !== 'v1'){
    localStorage.clear(); // Tüm eski cache'i sil
    localStorage.setItem('_nika_cache_v', 'v1');
    location.reload();
  }
});

function openAddUserModal(){
  if(!canManage(STATE.cu)){alert('Yetki yok');return}
  const modal=document.createElement('div');
  modal.id='add-user-modal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000';
  modal.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;max-width:400px;width:90%">
      <div style="font-weight:700;margin-bottom:15px;color:var(--gold)">👤 Yeni Kullanıcı Ekle</div>
      <input type="text" id="au-name" placeholder="Ad Soyad..." style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);margin-bottom:10px;font-family:'Exo 2',sans-serif">
      <input type="email" id="au-email" placeholder="E-posta..." style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);margin-bottom:10px;font-family:'Exo 2',sans-serif">
      <input type="password" id="au-pass" placeholder="Şifre (en az 4 karakter)..." style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);margin-bottom:10px;font-family:'Exo 2',sans-serif">
      <select id="au-role" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);margin-bottom:15px;font-family:'Exo 2',sans-serif"><option value="engineer">Engineer</option><option value="koordinator">Koordinatör</option><option value="patron">Patron</option></select>
      <div style="display:flex;gap:8px"><button onclick="saveNewUser()" style="flex:1;padding:8px;background:var(--gold);color:#080c12;border:none;border-radius:var(--r);cursor:pointer;font-weight:700;font-family:'Exo 2',sans-serif">Ekle</button><button onclick="document.getElementById('add-user-modal').remove()" style="flex:1;padding:8px;background:var(--border);color:var(--text);border:none;border-radius:var(--r);cursor:pointer;font-family:'Exo 2',sans-serif">İptal</button></div>
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('au-name').focus();
}

function saveNewUser(){
  const name=document.getElementById('au-name').value.trim();
  const email=document.getElementById('au-email').value.trim();
  const pass=document.getElementById('au-pass').value;
  const role=document.getElementById('au-role').value;
  if(!name||!email||!pass){alert('Ad, e-posta ve şifre zorunlu');return}
  if(pass.length<4){alert('Şifre en az 4 karakter');return}
  const id='u_'+genId();
  const newUser={id:id,name:name,email:email,role:role,initials:name.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2),photo:null,password_hash:pass,notif_email:true,notif_teams:false,teams_webhook:'',created_at:new Date().toISOString()};
  STATE.users.push(newUser);
  svUsers();
  document.getElementById('add-user-modal').remove();
  alert('✓ Kullanıcı eklendi: '+name);
  renderPage();
}

</script>
